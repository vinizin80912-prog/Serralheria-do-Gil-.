<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Estilo estático para garantir visibilidade */
        body { background-color: #000000 !important; color: #ffffff !important; margin: 0; text-align: center; font-family: sans-serif; }

        .btn-link {
            display: flex !important; align-items: center; justify-content: center;
            width: 92%; max-width: 400px; margin: 12px auto;
            padding: 22px; border-radius: 12px; text-decoration: none;
            font-weight: 900; font-size: 1.1rem; border: 4px solid #ffffff !important;
            opacity: 1 !important; visibility: visible !important;
        }
        
        /* Destaque para serviços */
        .ouro { background-color: #FFD700 !important; color: #000000 !important; }
        .social { background-color: #1a1a1a !important; color: #ffffff !important; }

        .icon-btn { margin-right: 15px; font-size: 1.5rem; width: 30px; text-align: center; }

        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        h2 { color: #FFD700; margin: 30px 0 15px; text-transform: uppercase; font-size: 1.3rem; }

</head>

        <button onclick="login()" style="padding:20px 40px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:1.2rem;">

    </div>

    <div id="app" style="display:none; padding: 20px 0 60px;">
        <h1 style="color:#FFD700; font-size: 1.8rem; margin-bottom: 5px;">GIL SERRALHERIA</h1>
        <p style="color: #bbb; margin-bottom: 25px;">Curitiba e São José dos Pinhais</p>

        </a>
        <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Cobertura" class="btn-link ouro">
            <i class="fas fa-tools icon-btn"></i> COBERTURAS
        </a>

        <h2>Acompanhe o Gil</h2>
        
        <a href="https://wa.me/5541995008252" class="btn-link social">
            <i class="fab fa-whatsapp icon-btn" style="color:#25D366;"></i> WHATSAPP
        </a>
        <a href="https://www.instagram.com/serralheriadogil/" class="btn-link social">
            <i class="fab fa-instagram icon-btn" style="color:#E1306C;"></i> INSTAGRAM
        </a>
        <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" target="_blank" class="btn-link social">
            <i class="fab fa-facebook-f icon-btn" style="color:#1877F2;"></i> FACEBOOK
        </a>

        <footer style="margin-top: 50px; color: #555; font-size: 0.9rem;">
            © 2026 GIL SERRALHERIA
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                /* Exibição instantânea sem animações que travam */
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert("Erro: " + e.message));
        }
    </script>
</body>
</html>
