<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria do Gil | Elite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #FFD700 100%);
            --black-abs: #000000;
        }

        body {
            background-color: var(--black-abs);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            padding: 30px 20px; /* Aumentado para evitar achatamento */
            text-align: center;
        }

        header { padding: 50px 0 30px; }

        .logo-shield {
            font-size: 60px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4));
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin: 20px 0 5px;
            text-transform: uppercase;
        }

        /* AJUSTE DOS BOTÕES (MAIS ALTOS) */
        .btn-gold {
            background: var(--gold-gradient);
            color: #000;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 25px; /* Aumentado para não achatar */
            margin-bottom: 18px;
            border-radius: 15px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border: none;
            transition: 0.3s;
        }

        .btn-social {
            background: #0a0a0a;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 4px solid #ffffff; /* Borda branca agressiva */
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-social i { margin-right: 15px; font-size: 1.4rem; }

        .section-title {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: #444;
            margin: 40px 0 25px;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo-shield"><i class="fas fa-hammer"></i></div>
            <h1>Serralheria do Gil</h1>
            <p style="color: #888; font-weight: 700; margin-top: 10px;">CURITIBA & SÃO JOSÉ DOS PINHAIS</p>
            <a href="https://maps.app.goo.gl/seu-link-aqui" class="btn-small" style="color:#FFD700; border: 1px solid #FFD700; padding: 5px 15px; border-radius: 20px; text-decoration: none; font-size: 0.8rem; margin-top: 15px; display: inline-block;">
                <i class="fas fa-location-dot"></i> VER NO MAPA
            </a>
        </header>

        <section>
            <h2 class="section-title">SOLICITAR ORÇAMENTO</h2>
            
            <a href="https://wa.me/5541995008252" class="btn-gold pulse">
                <span><i class="fab fa-whatsapp"></i> ORÇAMENTO GERAL</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://wa.me/5541995008252" class="btn-gold">
                <span><i class="fas fa-gate"></i> PORTÃO ELETRÔNICO</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://wa.me/5541995008252" class="btn-gold">
                <span><i class="fas fa-border-all"></i> GRADES E JANELAS</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </section>

        <section>
            <h2 class="section-title">REDES E CONTATO</h2>
            
            <a href="https://instagram.com/serralheriadogil" class="btn-social">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a href="https://facebook.com/serralheriadogil" class="btn-social">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>

            <a href="mailto:Serralheriadogil@hotmail.com" class="btn-social">
                <i class="fas fa-envelope"></i> Serralheriadogil@hotmail.com
            </a>
        </section>
                <div style="margin-top: 60px; border-top: 1px solid #222; padding-top: 30px;">
            <div style="color: #FFD700; font-size: 1.2rem; margin-bottom: 10px;">
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
            </div>
            <p style="color: #666; font-size: 0.9rem; font-style: italic;">Qualidade garantida por quem entende de aço.</p>
        </div>

        <footer style="margin: 40px 0; color: #333; font-size: 0.7rem; letter-spacing: 3px;">
            © 2026 SERRALHERIA DO GIL
        </footer>
    </div>

    <script>
        // Animação de entrada fluida (Corrige o visual estático)
        gsap.from(".logo-shield, h1", { duration: 1.2, y: -30, opacity: 0, ease: "power4.out" });
        
        gsap.from(".btn-gold", {
            duration: 1,
            y: 50,
            opacity: 0,
            stagger: 0.15,
            ease: "back.out(1.7)",
            delay: 0.3
        });

        gsap.from(".btn-social", {
            duration: 1,
            scale: 0.9,
            opacity: 0,
            stagger: 0.1,
            ease: "power2.out",
            delay: 0.8
        });
    </script>
</body>
</html>
