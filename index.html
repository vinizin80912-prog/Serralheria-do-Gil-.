<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria do Gil</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Fundo preto absoluto e texto branco */
        body { background-color: #000 !important; color: #fff; margin: 0; text-align: center; }

        /* Botões com cores sólidas e bordas brancas para não sumirem */
        .btn {
            display: block; width: 85%; max-width: 350px; margin: 15px auto;
            padding: 22px; border-radius: 12px; text-decoration: none;
            font-weight: 800; font-size: 1.2rem; border: 4px solid #fff !important;
        }
        
        /* Amarelo vibrante para orçamentos */
        .ouro { background-color: #FFD700 !important; color: #000 !important; }
        
        /* Cores vibrantes para redes sociais para evitar botões pretos */
        .whats { background-color: #25D366 !important; color: #fff !important; }
        .insta { background-color: #E1306C !important; color: #fff !important; }
        .face  { background-color: #1877F2 !important; color: #fff !important; }

        #login-box {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="login-box">
        <h1 style="color:#FFD700; margin-bottom:20px;">GIL SERRALHERIA</h1>
        <button onclick="login()" style="padding:20px 40px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:1.1rem;">
            ENTRAR COM GOOGLE
        </button>
    </div>

    <div id="conteudo" style="display:none; padding-top: 30px;">
        <h2 style="color:#FFD700; margin-bottom:20px;">ORÇAMENTOS</h2>
        <a href="https://wa.me/5541995008252" class="btn ouro">ORÇAMENTO GERAL</a>
        <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Grade" class="btn ouro">ORÇAMENTO DE GRADE</a>

        <h2 style="color:#FFD700; margin: 40px 0 20px;">NOSSAS REDES</h2>
        <a href="https://wa.me/5541995008252" class="btn whats"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
        <a href="https://www.instagram.com/serralheriadogil/" class="btn insta"><i class="fab fa-instagram"></i> INSTAGRAM</a>
        <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" target="_blank" class="btn face"><i class="fab fa-facebook-f"></i> FACEBOOK</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('conteudo').style.display = 'block';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert("Erro: " + e.message));
        }
    </script>
</body>
</html>
