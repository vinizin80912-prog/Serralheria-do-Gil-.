<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria do Gil</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #1a1a1a; }
        body { background: var(--bg) !important; color: #fff; text-align: center; font-family: sans-serif; margin: 0; }

        /* Animações suaves apenas em CSS para segurança */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.4s ease forwards; }

        .btn-link {
            display: flex !important; align-items: center; justify-content: center;
            width: 90%; max-width: 400px; margin: 12px auto;
            padding: 20px; border-radius: 12px; text-decoration: none;
            font-weight: 900; font-size: 1.1rem; border: 3px solid #fff !important;
        }
        .ouro { background: var(--gold) !important; color: #000 !important; }
        .social { background: var(--card) !important; color: #fff !important; }
        .icon-btn { margin-right: 15px; font-size: 1.4rem; width: 30px; text-align: center; }

        /* Estilo dos Comentários */
        .comment-card {
            background: var(--card); border-left: 5px solid var(--gold);
            width: 90%; max-width: 400px; margin: 10px auto;
            padding: 15px; text-align: left; border-radius: 8px;
        }
        .stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 5px; }

        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        h2 { color: var(--gold); margin: 35px 0 15px; text-transform: uppercase; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color:var(--gold);">GIL SERRALHERIA</h1>
        <button onclick="login()" style="padding:20px 40px; border-radius:10px; font-weight:bold; cursor:pointer;">
            ENTRAR COM GOOGLE
        </button>
    </div>

    <div id="app" style="display:none; padding: 20px 0 60px;">
        <h1 style="color:var(--gold);">GIL SERRALHERIA</h1>

        <h2>Nossos Serviços</h2>
        <div class="reveal">
            <a href="https://wa.me/5541995008252?text=Orcamento%20Geral" class="btn-link ouro">
                <i class="fas fa-hammer icon-btn"></i> ORÇAMENTO GERAL
            </a>
            <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Portão" class="btn-link ouro">
                <i class="fas fa-door-open icon-btn"></i> PORTÃO ELETRÔNICO
            </a>
            <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Grade" class="btn-link ouro">
                <i class="fas fa-shield-alt icon-btn"></i> GRADES E JANELAS
            </a>
            <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Corrimão" class="btn-link ouro">
                <i class="fas fa-grip-lines icon-btn"></i> CORRIMÃO E SACADAS
            </a>
        </div>

        <h2>O que dizem os clientes</h2>
        <div class="comment-card reveal">
            <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
            <p style="margin:0; font-size:0.9rem;"><strong>João Silva:</strong> "Trabalho impecável no meu portão!"</p>
        </div>

        <a href="https://g.page/r/YOUR_GOOGLE_REVIEW_LINK/review" target="_blank" class="btn-link social reveal">
            <i class="fas fa-comment-dots icon-btn" style="color:var(--gold);"></i> DEIXAR AVALIAÇÃO
        </a>

        <h2>Redes Sociais</h2>
        <div class="reveal">
            <a href="https://wa.me/5541995008252" class="btn-link social">
                <i class="fab fa-whatsapp icon-btn" style="color:#25D366;"></i> WHATSAPP
            </a>
            <a href="https://www.instagram.com/serralheriadogil/" class="btn-link social">
                <i class="fab fa-instagram icon-btn" style="color:#E1306C;"></i> INSTAGRAM
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert("Erro: " + e.message));
        }
    </script>
</body>
</html>
