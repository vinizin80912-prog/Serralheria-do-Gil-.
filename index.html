<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serralheria do Gil | Contraste Total</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-yellow: #FFEA00;
            --neon-green: #39FF14;
            --fb-blue: #1877F2;
            --insta-pink: #E1306C;
            --mail-red: #FF4B2B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background: #000; color: white; overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: #000; border-bottom: 4px solid var(--neon-yellow);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 100px 20px 60px; }

        /* --- BOTÕES COM CORES QUE NÃO SOMEM --- */
        .btn-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 22px;
            border-radius: 20px;
            margin-bottom: 18px;
            font-weight: 900;
            text-transform: uppercase;
            border: 3px solid white; /* Borda branca para destaque total */
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        /* Cores de fundo sólidas */
        .bg-yellow { background: var(--neon-yellow); color: #000; }
        .bg-green  { background: var(--neon-green); color: #000; }
        .bg-blue   { background: var(--fb-blue); color: #fff; }
        .bg-pink   { background: var(--insta-pink); color: #fff; }
        .bg-red    { background: var(--mail-red); color: #fff; }

        .icon-circle {
            width: 45px; height: 45px; background: rgba(0,0,0,0.15);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; margin-right: 15px; font-size: 1.5rem;
        }

        .section-title {
            text-align: center; color: var(--neon-yellow); font-weight: 900;
            margin: 40px 0 20px; font-size: 1.2rem; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="login-overlay" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center; width:80%;">
            <h1 style="color:var(--neon-yellow); margin-bottom:30px;">GIL SERRALHERIA</h1>
            <button onclick="login()" style="width:100%; padding:20px; border-radius:50px; background:#fff; font-weight:900; border:none; cursor:pointer;">ENTRAR COM GOOGLE</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header><span style="color:var(--neon-yellow); font-weight:900;">GIL SERRALHERIA</span></header>

        <div class="container">
            <a href="https://wa.me/5541995008252?text=Orçamento Geral" class="btn-link bg-yellow">
                <div class="icon-circle"><i class="fas fa-hammer"></i></div>
                Orçamento Geral
            </a>

            <a href="https://wa.me/5541995008252?text=Orçamento de Grade" class="btn-link bg-yellow">
                <div class="icon-circle"><i class="fas fa-shield-alt"></i></div>
                Orçamento de Grade
            </a>

            <div class="section-title">Nossas Redes</div>

            <a href="https://wa.me/5541995008252" class="btn-link bg-green">
                <div class="icon-circle"><i class="fab fa-whatsapp"></i></div>
                WhatsApp do Gil
            </a>

            <a href="https://www.instagram.com/serralheriadogil/" class="btn-link bg-pink">
                <div class="icon-circle"><i class="fab fa-instagram"></i></div>
                Instagram
            </a>

            <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" target="_blank" class="btn-link bg-blue">
                <div class="icon-circle"><i class="fab fa-facebook-f"></i></div>
                Facebook
            </a>

            <a href="mailto:Serralheriadogil@hotmail.com" class="btn-link bg-red">
                <div class="icon-circle"><i class="fas fa-envelope"></i></div>
                Enviar E-mail
            </a>
        </div>
    </div>
        <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                // Animação rápida só para dar o efeito "Zica"
                gsap.from(".btn-link", { y: 50, opacity: 0, stagger: 0.1, duration: 0.5, ease: "back.out" });
            }
        });

        function login() { auth.signInWithPopup(provider).catch(alert); }
    </script>
</body>
</html>
