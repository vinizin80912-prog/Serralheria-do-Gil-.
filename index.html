<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria do Gil</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #FFD700; --bg: #000; }
        body { background: var(--bg) !important; color: #fff; text-align: center; font-family: sans-serif; margin: 0; }

        /* Animação CSS que não trava a tela */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: fadeInUp 0.4s ease forwards; }

        .btn-link {
            display: flex !important; align-items: center; justify-content: center;
            width: 90%; max-width: 400px; margin: 12px auto;
            padding: 22px; border-radius: 12px; text-decoration: none;
            font-weight: 900; font-size: 1.1rem; border: 4px solid #fff !important;
        }
        .ouro { background: var(--gold) !important; color: #000 !important; }
        .social { background: #1a1a1a !important; color: #fff !important; }
        .icon-btn { margin-right: 15px; font-size: 1.4rem; width: 30px; text-align: center; }

        .comment-card {
            background: #1a1a1a; border-left: 5px solid var(--gold);
            width: 85%; max-width: 400px; margin: 10px auto; padding: 15px;
            text-align: left; border-radius: 8px; font-size: 0.9rem;
        }

        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        h2 { color: var(--gold); margin: 30px 0 10px; text-transform: uppercase; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color:var(--gold);">GIL SERRALHERIA</h1>
        <button onclick="login()" style="padding:20px 40px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:1.1rem;">
            ENTRAR COM GOOGLE
        </button>
    </div>

    <div id="app" style="display:none; padding-bottom: 50px;">
        <h1 style="color:var(--gold); margin-top:20px;">GIL SERRALHERIA</h1>

        <h2>Orçamentos</h2>
        <div class="reveal">
            <a href="https://wa.me/5541995008252?text=Orcamento%20Geral" class="btn-link ouro">
                <i class="fas fa-hammer icon-btn"></i> ORÇAMENTO GERAL
            </a>
            <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Portão" class="btn-link ouro">
                <i class="fas fa-door-open icon-btn"></i> PORTÃO ELETRÔNICO
            </a>
            <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Grade" class="btn-link ouro">
                <i class="fas fa-shield-alt icon-btn"></i> GRADES E JANELAS
            </a>
            <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Cobertura" class="btn-link ouro">
                <i class="fas fa-tools icon-btn"></i> COBERTURAS
            </a>
        </div>

        <h2>O que dizem os clientes</h2>
        <div class="comment-card reveal">
            <div style="color:var(--gold); margin-bottom:5px;"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
            <p style="margin:0;"><strong>João Silva:</strong> "Trabalho excelente no portão!"</p>
        </div>

        <a href="https://wa.me/5541995008252?text=Quero%20deixar%20um%20elogio" class="btn-link social reveal">
            <i class="fas fa-comment-dots icon-btn" style="color:var(--gold);"></i> DEIXAR AVALIAÇÃO
        </a>

        <h2>Redes Sociais</h2>
        <div class="reveal">
            <a href="https://wa.me/5541995008252" class="btn-link social">
                <i class="fab fa-whatsapp icon-btn" style="color:#25D366;"></i> WHATSAPP
            </a>
            <a href="https://www.instagram.com/serralheriadogil/" class="btn-link social">
                <i class="fab fa-instagram icon-btn" style="color:#E1306C;"></i> INSTAGRAM
            </a>
            <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" class="btn-link social">
                <i class="fab fa-facebook-f icon-btn" style="color:#1877F2;"></i> FACEBOOK
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert("Erro: " + e.message));
        }
    </script>
</body>
</html>
