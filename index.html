<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serralheria do Gil | Premium Mobile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/scrollreveal"></script>

    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #0c0c0c;
            --gold-primary: #FFD700;
            --gold-dark: #B8860B;
            --border-white: #ffffff;
            --text-gray: #a1a1aa;
            --gold-grad: linear-gradient(135deg, #FFD700 0%, #B8860B 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* TELA DE LOGIN PREMIUM */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
        }

        .login-box {
            background: #080808;
            border: 1px solid #1a1a1a;
            padding: 45px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .login-box h2 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--gold-primary);
        }

        /* CONTEÚDO PRINCIPAL */
        .app-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 60px 20px 120px; /* Padding bottom para não bater no zap */
            display: none; /* Inicia oculto para o login */
        }

        /* BOTÕES DE SERVIÇO (ESTILO VÍDEO) */
        .service-card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
        }

        .service-card:active { transform: scale(0.96); background: #111; }

        .service-content { display: flex; align-items: center; gap: 18px; }
        
        .service-icon {
            font-size: 1.4rem;
            color: var(--gold-primary);
            width: 30px;
            text-align: center;
        }

        .service-title { font-weight: 700; font-size: 1rem; }

        /* BOTÕES SOCIAIS (REGRA DE OURO: BORDA BRANCA 4PX) */
        .social-link {
            border: 4px solid var(--border-white);
            background: transparent;
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* WHATSAPP FLUTUANTE COM PULSO */
        .btn-float-zap {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 65px;
            height: 65px;
            background: #25d366;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            z-index: 999;
        }

        .pulse-animation {
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <div style="margin-bottom: 25px;">
                <i class="fas fa-shield-alt fa-3x" style="color: var(--gold-primary);"></i>
            </div>
            <h2>Serralheria do Gil</h2>
            <p style="color: #666; font-size: 0.85rem; margin-bottom: 30px;">Acesse nosso catálogo de serviços e orçamentos exclusivos.</p>
            
            <button id="btnLoginGoogle" style="width:100%; padding:18px; border-radius:15px; border:none; background:#fff; color:#000; font-weight:800; display:flex; align-items:center; justify-content:center; gap:10px; cursor:pointer;">
                <i class="fab fa-google"></i> Entrar com Google
            </button>
            
            <button id="btnBypass" style="margin-top:20px; background:transparent; border:none; color:#333; font-size:0.75rem; text-decoration:underline;">Entrar como Visitante</button>
        </div>
    </div>

    <div id="app-main" class="app-container">
        <header style="text-align: center; margin-bottom: 50px;">
            <h1 style="font-family: 'Syncopate', sans-serif; font-size: 1.6rem; letter-spacing: 2px;">Serralheria do Gil</h1>
            <p style="color: var(--gold-primary); font-weight: 700; font-size: 0.8rem; margin-top: 5px;">QUALIDADE EM AÇO E FERRO</p>
            
            <div style="margin-top: 20px;">
                <a href="https://maps.app.goo.gl/xyz" target="_blank" style="color: #fff; text-decoration: none; font-size: 0.75rem; background: #1a1a1a; padding: 8px 15px; border-radius: 50px; border: 1px solid #333;">
                    <i class="fas fa-map-marker-alt" style="color: var(--gold-primary);"></i> Curitiba & SJP
                </a>
            </div>
        </header>

        <section>
            <h3 style="font-size: 0.75rem; letter-spacing: 3px; color: #444; margin-bottom: 20px; font-weight: 800; text-transform: uppercase;">Nossos Serviços</h3>
            
            <a href="https://wa.me/5541995008252?text=Olá!%20Gostaria%20de%20um%20orçamento%20para%20Portão." class="service-card">
                <div class="service-content">
                    <i class="fas fa-gate service-icon"></i>
                    <span class="service-title">Portão Eletrônico</span>
                </div>
                <i class="fas fa-arrow-right" style="font-size: 0.8rem; color: #333;"></i>
            </a>

            <a href="https://wa.me/5541995008252?text=Olá!%20Gostaria%20de%20um%20orçamento%20para%20Grades." class="service-card">
                <div class="service-content">
                    <i class="fas fa-border-all service-icon"></i>
                    <span class="service-title">Grades e Janelas</span>
                </div>
                <i class="fas fa-arrow-right" style="font-size: 0.8rem; color: #333;"></i>
            </a>

            <a href="https://wa.me/5541995008252?text=Olá!%20Gostaria%20de%20um%20orçamento%20para%20Cobertura." class="service-card">
                <div class="service-content">
                    <i class="fas fa-warehouse service-icon"></i>
                    <span class="service-title">Coberturas Metálicas</span>
                </div>
                <i class="fas fa-arrow-right" style="font-size: 0.8rem; color: #333;"></i>
            </a>
        </section>

        <section style="margin-top: 45px;">
            <h3 style="font-size: 0.75rem; letter-spacing: 3px; color: #444; margin-bottom: 20px; font-weight: 800; text-transform: uppercase;">Contato & Social</h3>
            
            <a href="https://instagram.com/serralheriadogil" target="_blank" class="social-link">
                <i class="fab fa-instagram fa-lg" style="margin-right: 15px;"></i> Instagram
            </a>

            <a href="https://facebook.com/serralheriadogil" target="_blank" class="social-link">
                <i class="fab fa-facebook-f fa-lg" style="margin-right: 15px; width: 20px; text-align: center;"></i> Facebook
            </a>

            <a href="mailto:Serralheriadogil@hotmail.com" class="social-link">
                <i class="fas fa-envelope fa-lg" style="margin-right: 15px;"></i> E-mail Hotmail
            </a>
        </section>

        <a href="https://wa.me/5541995008252" class="btn-float-zap pulse-animation" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>

        <footer style="text-align: center; margin-top: 60px; color: #222; font-size: 0.7rem; font-weight: 800;">
            © 2026 SERRALHERIA DO GIL
        </footer>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('login-screen');
        const appMain = document.getElementById('app-main');

        // FUNÇÃO PARA LIBERAR O APP
        function showApp() {
            gsap.to(loginScreen, {
                opacity: 0,
                y: -50,
                duration: 0.6,
                ease: "power4.inOut",
                onComplete: () => {
                    loginScreen.style.display = 'none';
                    appMain.style.display = 'block';
                    
                    // Animação de entrada dos itens (Cascata)
                    gsap.from("header", { opacity: 0, y: 30, duration: 1 });
                    gsap.from(".service-card", { 
                        opacity: 0, 
                        y: 40, 
                        stagger: 0.15, 
                        duration: 0.8, 
                        ease: "back.out(1.7)",
                        delay: 0.3
                    });
                    gsap.from(".social-link", { 
                        opacity: 0, 
                        x: -30, 
                        stagger: 0.1, 
                        duration: 0.6,
                        delay: 0.8
                    });
                }
            });
        }

        // EVENTOS
        document.getElementById('btnLoginGoogle').onclick = () => {
            signInWithPopup(auth, provider)
                .then(() => showApp())
                .catch(err => alert("Erro ao autenticar: " + err.message));
        };

        document.getElementById('btnBypass').onclick = () => showApp();

        // Efeito ScrollReveal para seções de contato
        ScrollReveal().reveal('.social-link', { delay: 200, distance: '20px', origin: 'bottom' });

    </script>
</body>
</html>
