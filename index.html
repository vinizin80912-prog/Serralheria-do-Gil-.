<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serralheria do Gil | Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #0d0d0d;
            --gold: #FFD700;
            --border-color: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .login-card { background: #080808; border: 1px solid var(--border-color); padding: 40px 25px; border-radius: 24px; width: 100%; max-width: 350px; text-align: center; }

        /* CONTEÚDO E SCROLL */
        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 50px 20px 120px; }
        .service-item { background: var(--card-bg); border: 1px solid var(--border-color); padding: 22px; border-radius: 16px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: #fff; }
        
        /* BOTÕES SOCIAIS COM BORDA BRANCA */
        .btn-social-box { border: 4px solid #ffffff; background: transparent; margin-bottom: 15px; padding: 18px; border-radius: 15px; display: flex; align-items: center; color: #fff; text-decoration: none; font-weight: 700; }

        /* ZAP FLUTUANTE */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 30px;
            right: 25px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <i class="fas fa-lock fa-3x" style="color: var(--gold); margin-bottom: 20px;"></i>
            <h2>Acesso Restrito</h2>
            <button id="btnLogin" style="background:#fff; color:#000; padding:15px; width:100%; border-radius:12px; font-weight:800; border:none; margin-top:20px;">
                <i class="fab fa-google"></i> Entrar com Google
            </button>
            <button id="btnBypass" style="background:transparent; border:none; color:#444; margin-top:15px; font-size:0.7rem;">Entrar como Visitante</button>
        </div>
    </div>

    <div id="app-content" class="container hidden">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 2rem; font-weight: 800;">Serralheria do Gil</h1>
            <p style="color: #666;">Curitiba & São José dos Pinhais</p>
        </header>

        <section>
            <h3 style="margin-bottom: 20px; color: var(--gold); letter-spacing: 2px;">SERVIÇOS</h3>
            <a href="https://wa.me/5541995008252" class="service-item"><span><i class="fas fa-gate"></i> Portões</span><i class="fas fa-chevron-right"></i></a>
            <a href="https://wa.me/5541995008252" class="service-item"><span><i class="fas fa-shield-alt"></i> Grades</span><i class="fas fa-chevron-right"></i></a>
        </section>

        <section style="margin-top: 40px;">
            <h3 style="margin-bottom: 20px; letter-spacing: 2px;">CONTATO</h3>
            <a href="https://instagram.com/serralheriadogil" class="btn-social-box"><i class="fab fa-instagram" style="margin-right:15px;"></i> Instagram</a>
            
            <a href="https://facebook.com/serralheriadogil" class="btn-social-box"><i class="fab fa-facebook-f" style="margin-right:15px;"></i> Facebook</a>
            
            <a href="mailto:Serralheriadogil@hotmail.com" class="btn-social-box"><i class="fas fa-envelope" style="margin-right:15px;"></i> Serralheriadogil@hotmail.com</a>
        </section>

        <a href="https://wa.me/5541995008252" class="whatsapp-float" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        function unlock() {
            gsap.to("#login-screen", { opacity: 0, duration: 0.5, onComplete: () => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                gsap.from(".service-item, .btn-social-box", { y: 30, opacity: 0, stagger: 0.1 });
            }});
        }

        document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider).then(unlock);
        document.getElementById('btnBypass').onclick = unlock;
    </script>
</body>
</html>
