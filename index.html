<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria do Gil</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #000; color: #fff; text-align: center; }

        /* Botões com visibilidade garantida e cores vibrantes */
        .btn-acao {
            display: block; width: 90%; max-width: 400px; margin: 15px auto;
            padding: 20px; border-radius: 15px; text-decoration: none;
            font-weight: bold; font-size: 1.1rem; border: 2px solid #fff;
        }
        .btn-ouro { background-color: #FFD700; color: #000; }
        .btn-social { background-color: #1a1a1a; color: #fff; border: 1px solid #444; }

        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:#FFD700; margin-bottom:20px;">GIL SERRALHERIA</h1>
        <button onclick="login()" style="padding:15px 30px; border-radius:10px; font-weight:bold; cursor:pointer;">
            ENTRAR COM GOOGLE
        </button>
    </div>

    <div id="main-content" style="display:none; padding-top: 20px;">
        <h2 style="color:#FFD700;">ORÇAMENTOS</h2>
        
        <a href="https://wa.me/5541995008252" class="btn-acao btn-ouro">ORÇAMENTO GERAL</a>
        <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Grade" class="btn-acao btn-ouro">ORÇAMENTO DE GRADE</a>

        <h2 style="color:#FFD700; margin-top:30px;">REDES SOCIAIS</h2>
        
        <a href="https://wa.me/5541995008252" class="btn-acao btn-social">
            <i class="fab fa-whatsapp" style="color:#25D366;"></i> WHATSAPP
        </a>
        <a href="https://www.instagram.com/serralheriadogil/" class="btn-acao btn-social">
            <i class="fab fa-instagram" style="color:#E1306C;"></i> INSTAGRAM
        </a>
        <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" target="_blank" class="btn-acao btn-social">
            <i class="fab fa-facebook-f" style="color:#1877F2;"></i> FACEBOOK
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Erro: " + err.message));
        }
    </script>
</body>
</html>
