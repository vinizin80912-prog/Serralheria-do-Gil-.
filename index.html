<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria do Gil</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Fundo preto absoluto sem transições de cor */
        body { 
            background-color: #000000 !important; 
            color: #ffffff !important; 
            margin: 0; 
            padding: 0; 
            text-align: center;
        }

        /* Botões estáticos - sem efeitos de hover ou movimento */
        .btn-link {
            display: block !important; 
            width: 90%; 
            max-width: 400px; 
            margin: 15px auto;
            padding: 25px; 
            border-radius: 10px; 
            text-decoration: none;
            font-weight: 900; 
            font-size: 1.3rem; 
            border: 4px solid #ffffff !important;
            /* Garante que o botão apareça na hora */
            opacity: 1 !important; 
            visibility: visible !important;
        }
        
        .ouro { background-color: #FFD700 !important; color: #000000 !important; }
        .social { background-color: #222222 !important; color: #ffffff !important; }

        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color:#FFD700; margin-bottom:30px;">GIL SERRALHERIA</h1>
        <button onclick="login()" style="padding:20px 40px; border-radius:10px; font-weight:bold; cursor:pointer; font-size:1.2rem;">
            ENTRAR COM GOOGLE
        </button>
    </div>

    <div id="app" style="display:none; padding-top: 30px;">
        <h2 style="color:#FFD700; margin-bottom:20px;">ORÇAMENTOS</h2>
        
        <a href="https://wa.me/5541995008252" class="btn-link ouro">ORÇAMENTO GERAL</a>
        <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Grade" class="btn-link ouro">ORÇAMENTO DE GRADE</a>

        <h2 style="color:#FFD700; margin: 40px 0 20px;">REDES SOCIAIS</h2>
        
        <a href="https://wa.me/5541995008252" class="btn-link social">
            <i class="fab fa-whatsapp" style="color:#25D366;"></i> WHATSAPP
        </a>
        <a href="https://www.instagram.com/serralheriadogil/" class="btn-link social">
            <i class="fab fa-instagram" style="color:#E1306C;"></i> INSTAGRAM
        </a>
        <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" target="_blank" class="btn-link social">
            <i class="fab fa-facebook-f" style="color:#1877F2;"></i> FACEBOOK
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                // Comando seco para trocar a tela
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert("Erro no Login: " + e.message));
        }
    </script>
</body>
</html>
