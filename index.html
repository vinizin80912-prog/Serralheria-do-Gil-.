<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serralheria do Gil | Premium</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #FFC107; /* Amarelo Ouro para destaque */
            --bg-dark: #000000; /* Fundo preto que seu pai gosta */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background: var(--bg-dark); color: white; min-height: 100vh; }

        header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .container { max-width: 450px; margin: 0 auto; padding: 100px 20px 50px; }

        /* --- BOTÕES COM CORES VIVAS (ALTO CONTRASTE) --- */
        .btn-card {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 15px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        /* Efeito de luz passando pelo botão */
        .btn-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            animation: shine 5s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        /* Cores de Fundo para os botões não ficarem pretos */
        .btn-whats { background: #25D366; } 
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .btn-face  { background: #1877F2; } /* Azul oficial do Facebook */
        .btn-mail  { background: #EA4335; }
        .btn-main  { background: var(--primary); color: #000; }

        .icon-bg {
            width: 45px; height: 45px; background: rgba(0,0,0,0.1);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; margin-right: 15px; font-size: 1.3rem;
        }

        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div style="background:#111; padding:40px; border-radius:30px; border:2px solid var(--primary); text-align:center; width:85%; max-width:350px;">
            <h1 style="color:var(--primary); margin-bottom:20px;">GIL SERRALHERIA</h1>
            <button onclick="login()" style="width:100%; padding:18px; border-radius:50px; border:none; background:#fff; font-weight:800; cursor:pointer;">
                ENTRAR COM GOOGLE
            </button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header><span style="font-weight:900; color:var(--primary);">GIL SERRALHERIA</span></header>

        <div class="container">
            <h2 style="text-align:center; margin-bottom:40px; font-size:2rem;">Qualidade que <span style="color:var(--primary)">Protege</span></h2>

            <a href="https://wa.me/5541995008252" class="btn-card btn-main reveal-item">
                <div class="icon-bg"><i class="fas fa-hammer"></i></div>
                Orçamento Geral
            </a>

            <p style="color:var(--primary); font-weight:700; margin:40px 0 20px; text-align:center; letter-spacing:2px;">NOSSAS REDES</p>

            <a href="https://wa.me/5541995008252" class="btn-card btn-whats reveal-item">
                <div class="icon-bg"><i class="fab fa-whatsapp"></i></div>
                WhatsApp
            </a>

            <a href="https://www.instagram.com/serralheriadogil/" class="btn-card btn-insta reveal-item">
                <div class="icon-bg"><i class="fab fa-instagram"></i></div>
                Instagram
            </a>

            <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" class="btn-card btn-face reveal-item">
                <div class="icon-bg"><i class="fab fa-facebook-f"></i></div>
                Facebook
            </a>

            <a href="mailto:Serralheriadogil@hotmail.com" class="btn-card btn-mail reveal-item">
                <div class="icon-bg"><i class="fas fa-envelope"></i></div>
                E-mail
            </a>
        </div>
    </div>

    <script>
        // Use as suas chaves do Firebase aqui
        const firebaseConfig = { 
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                gsap.from(".reveal-item", { y: 30, opacity: 0, stagger: 0.1, duration: 0.8 });
            }
        });

        function login() { auth.signInWithPopup(provider); }
    </script>
</body>
</html>
