<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria do Gil | Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #FFD700 0%, #B8860B 50%, #FFD700 100%);
            --black-abs: #050505;
            --dark-card: #0c0c0c;
        }

        body {
            background-color: var(--black-abs);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        /* HEADER PREMIUM */
        header {
            padding: 40px 0;
        }

        .logo-shield {
            font-size: 50px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* BOTÃO DE OURO (AGRESSIVO) */
        .btn-gold {
            background: var(--gold-gradient);
            color: #000;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.95rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-gold::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .btn-gold:hover::after { left: 100%; }

        /* BOTÃO SOCIAL (BORDA BRANCA AGRESSIVA) */
        .btn-social {
            background: var(--dark-card);
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 4px solid #ffffff; /* A regra de ouro para acessibilidade */
            font-weight: 700;
            transition: 0.3s;
        }
        </head>
<body>
    <div class="main-container">
        <header>
            <div class="logo-shield"><i class="fas fa-shield-halved"></i></div>
            <h1>Serralheria do Gil</h1>
            <p style="color: #666; font-weight: 700; font-size: 0.8rem;">CURITIBA & SÃO JOSÉ DOS PINHAIS</p>
            <a href="https://maps.app.goo.gl/link" class="maps-tag">
                <i class="fas fa-location-dot"></i> VER NO MAPA
            </a>
        </header>

        <section id="orcamentos">
            <h2 class="section-title">SOLICITAR ORÇAMENTO</h2>
            
            <a href="https://wa.me/5541995008252" class="btn-gold pulse">
                <span><i class="fab fa-whatsapp"></i> ORÇAMENTO GERAL</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://wa.me/5541995008252" class="btn-gold">
                <span><i class="fas fa-gate"></i> PORTÃO ELETRÔNICO</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://wa.me/5541995008252" class="btn-gold">
                <span><i class="fas fa-border-all"></i> GRADES E JANELAS</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://wa.me/5541995008252" class="btn-gold">
                <span><i class="fas fa-stairs"></i> CORRIMÃO E SACADAS</span>
                <i class="fas fa-chevron-right"></i>
            </a>

            <a href="https://wa.me/5541995008252" class="btn-gold">
                <span><i class="fas fa-warehouse"></i> COBERTURAS METÁLICAS</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </section>

        <section style="margin-top: 40px;">
            <h2 class="section-title">ACOMPANHE NOSSA OBRA</h2>
            
            <a href="https://instagram.com/serralheriadogil" class="btn-social">
                <i class="fab fa-instagram"></i> Instagram Oficial
            </a>

            <a href="https://facebook.com" class="btn-social">
                <i class="fab fa-facebook-f"></i> Página Facebook
            </a>

            <a href="mailto:gil.serralheria@gmail.com" class="btn-social">
                <i class="fas fa-envelope"></i> gil.serralheria@gmail.com
            </a>
        </section>
                <div style="margin-top: 50px; background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222;">
            <div style="color: #FFD700; margin-bottom: 10px;">
                <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
            </div>
            <p style="font-style: italic; color: #aaa; font-size: 0.9rem;">"O melhor acabamento de Curitiba. Trabalho de mestre!"</p>
            <p style="font-weight: 700; margin-top: 10px; font-size: 0.8rem;">- CLIENTE SATISFEITO</p>
        </div>

        <footer style="margin: 50px 0; color: #444; font-size: 0.7rem; letter-spacing: 2px;">
            © 2026 SERRALHERIA DO GIL | QUALIDADE ABSOLUTA
        </footer>
    </div>

    <style>
        .section-title {
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: #555;
            margin-bottom: 20px;
            font-weight: 900;
        }
        
        .maps-tag {
            display: inline-block;
            padding: 8px 15px;
            border: 1px solid #FFD700;
            color: #FFD700;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 10px;
        }

        .pulse {
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }
    </style>

    <script>
        // Animação de entrada fluida
        gsap.from(".btn-gold", {
            duration: 1,
            y: 30,
            opacity: 0,
            stagger: 0.1,
            ease: "power4.out",
            delay: 0.5
        });

        gsap.from(".btn-social", {
            duration: 1,
            x: -30,
            opacity: 0,
            stagger: 0.1,
            ease: "power4.out",
            delay: 1
        });

        gsap.from("header", {
            duration: 1.5,
            opacity: 0,
            y: -20,
            ease: "expo.out"
        });
    </script>
</body>
</html>


        .btn-social i { margin-right: 15px; font-size: 1.3rem; }
