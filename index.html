<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serralheria do Gil</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* RESET TOTAL PARA NÃO TER ERRO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        
        body { 
            background-color: #000000 !important; 
            color: #ffffff !important; 
            padding-bottom: 50px;
        }

        /* HEADER FIXO E VISÍVEL */
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #FFD700;
            margin-bottom: 30px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* --- BOTÕES "ANTIFALHA" - CORES VIVAS E BORDAS BRANCAS --- */
        .btn-link {
            display: block !important;
            width: 100% !important;
            padding: 25px 15px !important;
            margin-bottom: 20px !important;
            border-radius: 15px !important;
            text-align: center !important;
            text-decoration: none !important;
            font-weight: bold !important;
            font-size: 1.2rem !important;
            text-transform: uppercase !important;
            /* Borda grossa branca para separar do fundo preto custe o que custar */
            border: 4px solid #ffffff !important; 
            transition: transform 0.2s;
        }

        /* CORES QUE NÃO SOMEM NO ESCURO */
        .btn-amarelo { background-color: #FFD700 !important; color: #000000 !important; }
        .btn-verde   { background-color: #28a745 !important; color: #ffffff !important; }
        .btn-azul    { background-color: #007bff !important; color: #ffffff !important; }
        .btn-rosa    { background-color: #e83e8c !important; color: #ffffff !important; }
        .btn-vermelho { background-color: #dc3545 !important; color: #ffffff !important; }

        .icon { margin-right: 10px; font-size: 1.4rem; }

        /* LOGIN */
        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="text-align:center; border: 3px solid #FFD700; padding: 40px; border-radius: 20px;">
            <h2 style="color:#FFD700; margin-bottom:20px;">GIL SERRALHERIA</h2>
            <button onclick="login()" style="padding:20px 40px; background:#fff; font-weight:bold; border-radius:10px; border:none; cursor:pointer;">
                ENTRAR AGORA
            </button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header>
            <h1 style="color:#FFD700;">SERRALHERIA DO GIL</h1>
        </header>

        <div class="container">
            <h2 style="text-align:center; margin-bottom:25px;">ORÇAMENTOS</h2>

            <a href="https://wa.me/5541995008252" class="btn-link btn-amarelo">
                <i class="fas fa-hammer icon"></i> ORÇAMENTO GERAL
            </a>

            <a href="https://wa.me/5541995008252?text=Orcamento%20de%20Grade" class="btn-link btn-amarelo">
                <i class="fas fa-shield-alt icon"></i> ORÇAMENTO GRADE
            </a>

            <h2 style="text-align:center; margin: 40px 0 20px; color:#FFD700;">REDES SOCIAIS</h2>

            <a href="https://wa.me/5541995008252" class="btn-link btn-verde">
                <i class="fab fa-whatsapp icon"></i> WHATSAPP
            </a>

            <a href="https://www.instagram.com/serralheriadogil/" class="btn-link btn-rosa">
                <i class="fab fa-instagram icon"></i> INSTAGRAM
            </a>

            <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" target="_blank" class="btn-link btn-azul">
                <i class="fab fa-facebook-f icon"></i> FACEBOOK
            </a>

            <a href="mailto:Serralheriadogil@hotmail.com" class="btn-link btn-vermelho">
                <i class="fas fa-envelope icon"></i> ENVIAR E-MAIL
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            }
        });

        function login() { auth.signInWithPopup(provider); }
    </script>
</body>
</html>
