<!DOCTYPE html>
<html lang="pt-br">
<head>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #000; color: white; text-align: center; }
        
        /* Estilo fixo para garantir que NADA fique preto/invisível */
        .btn-gold {
            display: flex; align-items: center; justify-content: center;
            background: #FFC107 !important; /* Amarelo Ouro Vivo */
            color: #000 !important;
            padding: 20px; border-radius: 15px;
            margin: 15px auto; width: 90%; max-width: 400px;
            text-decoration: none; font-weight: 800; font-size: 1.1rem;
            border: 2px solid #fff; box-shadow: 0 4px 15px rgba(255,193,7,0.4);
        }

        .btn-social {
            display: flex; align-items: center;
            background: #222 !important; /* Cinza bem claro para destacar do fundo */
            color: #fff !important;
            padding: 18px; border-radius: 15px;
            margin: 10px auto; width: 90%; max-width: 400px;
            text-decoration: none; font-weight: 600;
            border: 1px solid #444;
        }

        .icon-box { margin-right: 15px; font-size: 1.5rem; width: 30px; }
        
        header { padding: 30px 0; border-bottom: 2px solid #FFC107; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div id="login-overlay" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div style="border: 2px solid #FFC107; padding: 40px; border-radius: 20px;">
            <h2 style="color:#FFC107; margin-bottom:20px;">GIL SERRALHERIA</h2>
            <button onclick="login()" style="padding:15px 30px; border-radius:10px; border:none; background:#fff; font-weight:900; cursor:pointer;">ENTRAR COM GOOGLE</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <header>
            <h1 style="color:#FFC107; letter-spacing:2px;">GIL SERRALHERIA</h1>
        </header>

        <div style="padding: 0 20px;">
            <h2 style="margin-bottom: 25px;">Solicite seu Orçamento</h2>

            <a href="https://wa.me/5541995008252" class="btn-gold">
                <i class="fas fa-hammer" style="margin-right:10px;"></i> ORÇAMENTO GERAL
            </a>

            <a href="https://wa.me/5541995008252?text=Olá, quero orçamento de Grade" class="btn-gold">
                <i class="fas fa-shield-alt" style="margin-right:10px;"></i> ORÇAMENTO DE GRADE
            </a>

            <h3 style="margin: 40px 0 20px; color: #FFC107;">NOSSAS REDES</h3>

            <a href="https://wa.me/5541995008252" class="btn-social">
                <div class="icon-box" style="color:#25D366;"><i class="fab fa-whatsapp"></i></div>
                WhatsApp do Gil
            </a>

            <a href="https://www.instagram.com/serralheriadogil/" class="btn-social">
                <div class="icon-box" style="color:#E1306C;"><i class="fab fa-instagram"></i></div>
                Siga no Instagram
            </a>

            <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" target="_blank" class="btn-social">
                <div class="icon-box" style="color:#1877F2;"><i class="fab fa-facebook-f"></i></div>
                Acompanhe no Facebook
            </a>
        </div>

        <footer style="margin-top:50px; padding:20px; color:#666; font-size:0.8rem;">
            © 2026 GIL SERRALHERIA
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                gsap.from("#app-content", { opacity: 0, duration: 1 });
            }
        });

        function login() { auth.signInWithPopup(provider); }
    </script>
</body>
</html>
