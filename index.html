<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Serralheria do Gil | Contraste Máximo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #FFEA00; /* Amarelo Neon */
            --bg-site: #000000; /* Fundo Preto Absoluto */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background: var(--bg-site); color: white; overflow-x: hidden; min-height: 180vh; }

        header {
            position: fixed; top: 0; width: 100%; height: 75px;
            background: #000; border-bottom: 4px solid var(--primary);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .container { max-width: 480px; margin: 0 auto; padding: 120px 20px 100px; }

        /* --- BOTÕES COM CORES SÓLIDAS (SEM PRETO, SEM CINZA) --- */
        .btn-zica {
            position: relative;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #000; /* Texto preto para ler bem nas cores claras */
            padding: 24px;
            border-radius: 25px;
            margin-bottom: 25px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid #fff; /* Borda branca para destacar no preto */
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Cores Fortes */
        .btn-amarelo { background: #FFEA00; color: #000; } 
        .btn-verde   { background: #39FF14; color: #000; } /* Verde Neon */
        .btn-insta   { background: #FF00FF; color: #fff; border-color: #fff; } /* Rosa Choque */
        .btn-azul    { background: #00BFFF; color: #fff; border-color: #fff; } /* Azul Vivo */
        .btn-vermelho { background: #FF0000; color: #fff; border-color: #fff; } /* Vermelho Puro */

        .icon-box {
            width: 50px; height: 50px; background: rgba(0,0,0,0.1);
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; margin-right: 18px; font-size: 1.8rem;
        }

        .label-redes {
            text-align: center; color: var(--primary); font-weight: 900;
            margin: 80px 0 40px; font-size: 1.5rem; text-shadow: 0 0 10px var(--primary);
        }

        /* Login */
        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div style="background:#111; padding:50px; border-radius:40px; border:5px solid var(--primary); text-align:center; width:90%; max-width:380px;">
            <h1 style="color:var(--primary); font-size:2rem; margin-bottom:30px; font-weight:900;">ENTRAR NO APP</h1>
            <button onclick="login()" style="width:100%; padding:22px; border-radius:50px; border:none; background:#FFEA00; color:#000; font-weight:900; cursor:pointer; font-size:1.1rem;">
                LOGIN GOOGLE
            </button>
        </div>
    </div>

    <div id="app-content" style="display:none; opacity:0;">
        <header><span style="font-weight:900; color:var(--primary); font-size:1.2rem;">GIL SERRALHERIA</span></header>

        <div class="container">
            <a href="https://wa.me/5541995008252?text=Olá!%20Quero%20um%20Orçamento%20Geral." class="btn-zica btn-amarelo reveal-item">
                <div class="icon-box"><i class="fas fa-hammer"></i></div>
                Orçamento Geral
            </a>

            <a href="https://wa.me/5541995008252?text=Olá!%20Quero%20um%20Orçamento%20de%20Grade." class="btn-zica btn-amarelo reveal-item">
                <div class="icon-box"><i class="fas fa-shield-alt"></i></div>
                Orçamento Grade
            </a>

            <div class="label-redes reveal-item">NOSSAS REDES</div>

            <div style="margin-bottom: 150px;">
                <a href="https://wa.me/5541995008252" class="btn-zica btn-verde reveal-item">
                    <div class="icon-box"><i class="fab fa-whatsapp"></i></div>
                    WhatsApp do Gil
                </a>

                <a href="https://www.instagram.com/serralheriadogil/" class="btn-zica btn-insta reveal-item">
                    <div class="icon-box"><i class="fab fa-instagram"></i></div>
                    Instagram
                </a>

                <a href="https://www.facebook.com/share/1BBUJxg1jk/?mibextid=wwXIfr" target="_blank" class="btn-zica btn-azul reveal-item">
                    <div class="icon-box"><i class="fab fa-facebook-f"></i></div>
                    Facebook Oficial
                </a>

                <a href="mailto:Serralheriadogil@hotmail.com" class="btn-zica btn-vermelho reveal-item">
                    <div class="icon-box"><i class="fas fa-envelope"></i></div>
                    Enviar E-mail
                </a>
            </div>

            <footer style="text-align:center; color:#555; font-weight:900; padding-bottom:100px;">© 2026 SERRALHERIA DO GIL</footer>
        </div>
    </div>
        <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.onAuthStateChanged(user => {
            if (user) {
                gsap.to("#login-overlay", { y: "-100%", duration: 1.2, ease: "expo.inOut", onComplete: () => {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    animarEntrada();
                }});
            }
        });

        function animarEntrada() {
            gsap.to("#app-content", { opacity: 1, duration: 1 });

            // Botões caem girando para dar o efeito "Zica"
            gsap.from(".reveal-item", {
                y: 200,
                rotationX: -45,
                scale: 0,
                opacity: 0,
                duration: 1.2,
                stagger: 0.2,
                ease: "back.out(1.5)"
            });

            // ScrollReveal para quando descer a tela
            const sr = ScrollReveal({ distance: '100px', duration: 1500, delay: 300 });
            sr.reveal('.btn-zica', { origin: 'bottom', interval: 200 });
        }

        function login() { auth.signInWithPopup(provider); }
    </script>
</body>
</html>
