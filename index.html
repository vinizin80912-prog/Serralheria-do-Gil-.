<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria do Gil</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #1a1a1a; }
        body { background: var(--bg); color: #fff; text-align: center; font-family: sans-serif; margin: 0; overflow-x: hidden; }

        /* Animação de Surgimento Segura (CSS) */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { animation: fadeInUp 0.5s ease forwards; }

        /* Botões Estilizados */
        .btn-link {
            display: flex; align-items: center; justify-content: center;
            width: 90%; max-width: 400px; margin: 12px auto;
            padding: 20px; border-radius: 12px; text-decoration: none;
            font-weight: 900; border: 3px solid #fff !important;
        }
        .ouro { background: var(--gold); color: #000; }
        .social { background: var(--card); color: #fff; }

        /* Seção de Comentários */
        .comment-card {
            background: var(--card); border-left: 5px solid var(--gold);
            width: 90%; max-width: 400px; margin: 15px auto;
            padding: 15px; text-align: left; border-radius: 8px;
        }
        .stars { color: var(--gold); margin-bottom: 5px; }

        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 class="reveal" style="color:var(--gold);">GIL SERRALHERIA</h1>
        <button onclick="login()" style="padding:15px 30px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:20px;">
            ENTRAR COM GOOGLE
        </button>
    </div>

    <div id="app" style="display:none; padding: 20px 0 60px;">
        <h1 style="color:var(--gold);">GIL SERRALHERIA</h1>
        
        <div class="reveal" style="animation-delay: 0.1s;">
            <a href="https://wa.me/5541995008252" class="btn-link ouro">
                <i class="fas fa-hammer" style="margin-right:10px;"></i> ORÇAMENTO GERAL
            </a>
        </div>

        <h2 style="color:var(--gold); margin-top:40px;">O QUE DIZEM OS CLIENTES</h2>
        
        <div class="comment-card reveal" style="animation-delay: 0.2s;">
            <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
            <p><strong>João Silva:</strong> "Trabalho impecável no meu portão. O Gil é fera!"</p>
        </div>

        <div class="comment-card reveal" style="animation-delay: 0.3s;">
            <div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
            <p><strong>Maria Souza:</strong> "Melhor custo-benefício de SJP. Recomendo dms."</p>
        </div>

        <h2 style="color:var(--gold); margin-top:40px;">REDES SOCIAIS</h2>
        <a href="https://www.instagram.com/serralheriadogil/" class="btn-link social reveal" style="animation-delay: 0.4s;">
            <i class="fab fa-instagram" style="margin-right:10px; color:#E1306C;"></i> INSTAGRAM
        </a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3S-rA3fIDUlT5jKZXsFOB-6OQyuj6y68",
            authDomain: "serralheria-do-gil.firebaseapp.com",
            projectId: "serralheria-do-gil",
            storageBucket: "serralheria-do-gil.firebasestorage.app",
            messagingSenderId: "267882427773",
            appId: "1:267882427773:web:bf1689a6adda79f3334814"
        };
        firebase.initializeApp(firebaseConfig);

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        });

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).catch(e => alert("Erro: " + e.message));
        }
    </script>
</body>
</html>
